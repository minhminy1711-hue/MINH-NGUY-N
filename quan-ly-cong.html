<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Tổng hợp - GV Thể dục</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Hiệu ứng Tab đang chọn */
        .active-tab { 
            background-color: #0056b3 !important; 
            color: white !important; 
            border-bottom: 4px solid #ffcc00 !important;
        }
        /* Hiệu ứng Tab chưa chọn */
        .inactive-tab { color: #6b7280; border-bottom: 4px solid transparent; }
        .inactive-tab:hover { background-color: #f3f4f6; color: #0056b3; }

        /* Đảm bảo tiêu đề nằm giữa tuyệt đối */
        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">

    <div id="login-screen" class="min-h-screen bg-[#002d5a] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center border-t-8 border-[#ffcc00]">
            <h2 class="text-2xl font-bold text-[#002d5a] mb-6 uppercase tracking-tight">Quản Trị Viên</h2>
            <input type="password" id="adminPass" placeholder="Nhập mật khẩu" 
                   class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-center focus:outline-none focus:ring-2 focus:ring-[#0056b3] mb-4 text-lg">
            <button onclick="handleLogin()" class="w-full py-4 bg-[#0056b3] text-white rounded-xl font-bold hover:bg-[#004494] transition-all shadow-lg active:scale-95">
                ĐĂNG NHẬP HỆ THỐNG
            </button>
        </div>
    </div>

    <div id="admin-main" class="h-screen flex flex-col hidden">
        <header class="bg-[#002d5a] text-white py-4 px-6 flex items-center justify-between border-b-4 border-[#ffcc00] shadow-md z-20 relative h-16">
            <div class="w-20"></div> <h1 class="header-center text-lg font-bold tracking-wider uppercase whitespace-nowrap">
                Hệ thống Quản lý Tổng hợp
            </h1>
            
            <button onclick="location.reload()" class="text-[10px] bg-white/10 hover:bg-white/20 px-3 py-1 rounded-lg border border-white/20 uppercase font-medium transition-colors">
                Đăng xuất
            </button>
        </header>

        <nav id="nav-tabs" class="bg-white border-b border-gray-200 shadow-sm overflow-x-auto flex items-center justify-center px-4 py-0 gap-1 scrollbar-hide z-10">
            </nav>
        
        <main class="flex-grow relative bg-gray-200 p-2">
            <div id="loading-spinner" class="absolute inset-0 flex items-center justify-center bg-white z-0 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#0056b3]"></div>
            </div>
            <iframe id="main-iframe" class="w-full h-full rounded-xl shadow-inner border border-gray-300 bg-white relative z-10" src="" onload="hideLoading()"></iframe>
        </main>
    </div>

    <script>
       // CẤU HÌNH CÁC TAB ĐÃ HOÀN THIỆN 100%
        const TABS = [
            { id: 'web-data', label: '📊 Theo dõi học tập', src: 'https://docs.google.com/spreadsheets/d/1_0j5iyfuvORdDKglDzjX8b4HJ7mXF9_lJo796-sN5Ss/edit?usp=sharing' },
            
            // Tab 1: Xem bảng điểm AI
            { id: 'ai-data', label: '🤖 KẾT QUẢ CHẤM AI', src: 'https://docs.google.com/spreadsheets/d/1E7xc5rgKgzqaBEdw8nwq83cFHy9tkS9y3TVUj7Eg2m4/edit?usp=sharing' },
            
            // Tab 2: XEM TRỰC TIẾP KHO VIDEO TRÊN DRIVE (Hiển thị dạng lưới trực quan)
            { id: 'video-drive', label: '📁 KHO VIDEO HỌC SINH', src: 'https://drive.google.com/embeddedfolderview?id=1NbaRPPXEsDPHJYu_iVJxsTMZhwYzEsTW#grid' },
            
            { id: 'cd4-b1', label: '🏸 CĐ4 - Bài 1', src: 'https://docs.google.com/spreadsheets/d/17sk0IwBVyCR5EgwgqzsX2oNKLSAUguDhda_pew_4ddc/edit?usp=sharing' },
            { id: 'cd4-b2', label: '🏸 CĐ4 - Bài 2', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd5-b1', label: '🏸 CĐ5 - Bài 1', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd5-b2', label: '🏸 CĐ5 - Bài 2', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd5-b3', label: '🏸 CĐ5 - Bài 3', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd6-b1', label: '🏸 CĐ6 - Bài 1', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd6-b2', label: '🏸 CĐ6 - Bài 2', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' },
            { id: 'cd6-b3', label: '🏸 CĐ6 - Bài 3', src: 'https://docs.google.com/spreadsheets/d/ID_CUA_BAI_TIEP_THEO/edit?usp=sharing' }
        ];
        function handleLogin() {
            if (document.getElementById('adminPass').value === 'admin2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-main').classList.remove('hidden');
                initTabs();
            } else {
                alert("Mật khẩu không đúng!");
            }
        }

        function initTabs() {
            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = '';

            TABS.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.id = 'btn-' + tab.id;
                btn.className = 'px-4 py-4 font-bold text-[11px] transition-all whitespace-nowrap ' + (index === 0 ? 'active-tab' : 'inactive-tab');
                btn.innerHTML = tab.label;
                btn.onclick = () => switchTab(tab);
                nav.appendChild(btn);
            });

            switchTab(TABS[0]);
        }

        function switchTab(selectedTab) {
            showLoading();
            TABS.forEach(tab => {
                const btn = document.getElementById('btn-' + tab.id);
                if (tab.id === selectedTab.id) {
                    btn.className = 'px-4 py-4 font-bold text-[11px] transition-all whitespace-nowrap active-tab';
                } else {
                    btn.className = 'px-4 py-4 font-bold text-[11px] transition-all whitespace-nowrap inactive-tab';
                }
            });
            document.getElementById('main-iframe').src = selectedTab.src;
        }

        function showLoading() {
            document.getElementById('loading-spinner').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading-spinner').classList.add('hidden');
        }

        document.getElementById('adminPass').addEventListener("keyup", function(e) {
            if (e.key === "Enter") handleLogin();
        });
    </script>
</body>
</html>
